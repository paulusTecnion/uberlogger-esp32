<h1>Live data</h1>

<div class="flexcontainer">
  <div id="values">
    <div id="valuelist"><i>Loading...</i></div>
  </div>

  <div id="plot" class="greybox">
    <div id="plotctrl" style="font-size: smaller; margin-bottom: 6px;">
      Live window:
      <button type="button" onclick="setLiveWindow(60000)">1m</button>
      <button type="button" onclick="setLiveWindow(300000)">5m</button>
      <button type="button" onclick="setLiveWindow(900000)">15m</button>
      <button type="button" onclick="setLiveWindow(3600000)">1h</button>
      <button type="button" onclick="setLiveWindow(0)" title="Shows all retained history (max ~6 hours)">All (&le;6h)</button>
      &nbsp;|&nbsp;
      <button type="button" onclick="clearLiveView()" title="Empty the live-view history buffer (also clears saved history)">Clear</button>
      <span id="plotmode"></span>
    </div>
    <div id="plotly"></div>
  </div>
</div>
